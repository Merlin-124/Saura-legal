<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Saura — Email confirmed</title>
  <style>
    :root {
      --bg: #faf7f2;
      --ink: #1a1a1a;
      --muted: #555;
      --accent: #c8542a;
      --border: #e6dfd3;
      --card: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #15120e;
        --ink: #f5f1ea;
        --muted: #a89e8e;
        --accent: #e07a4d;
        --border: #2a241c;
        --card: #1c1812;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 420px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .badge {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .badge svg { width: 32px; height: 32px; }
    .brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 8px 0 12px;
    }
    p {
      color: var(--muted);
      margin: 0 0 8px;
    }
    .hint {
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#ffffff" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="brand">Saura</div>
    <h1>Email confirmed</h1>
    <p>Your email is verified and your account is ready.</p>
    <p class="hint">You can close this tab, open the <strong>Saura</strong> app, and sign in.</p>
  </main>
</body>
</html>
